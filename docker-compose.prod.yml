version: '3.9'

services:
  api:
    build: .
    container_name: routey66-api
    restart: always
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      NODE_ENV: production
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    depends_on:
      - evolution

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: routey66-admin
    restart: always
    ports:
      - '3001:3001'
    env_file: .env

  evolution:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: always
    ports:
      - '8080:8080'
    environment:
      SERVER_PORT: 8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      QRCODE_LIMIT: 30
      LANGUAGE: pt-BR
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  nginx:
    image: nginx:alpine
    container_name: routey66-nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - admin

volumes:
  evolution_instances:
  evolution_store:
